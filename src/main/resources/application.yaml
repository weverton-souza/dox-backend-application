server:
  port: ${PORT:8080}
  max-http-request-header-size: 16KB

spring:
  profiles:
    default: local
  main:
    allow-bean-definition-overriding: true
  application:
    name: DOX Backend
  jackson:
    default-property-inclusion: NON_NULL
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        multiTenancy: SCHEMA
        tenant_identifier_resolver: com.dox.adapter.out.tenant.TenantIdentifierResolver
        multi_tenant_connection_provider: com.dox.adapter.out.tenant.TenantConnectionProvider
        generate_statistics: false
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    generate-ddl: false
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: true

dox:
  security:
    jwt-signing-key: ${JWT_SECRET}
    access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:10800000}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:604800000}
  ai:
    enabled: ${AI_ENABLED:true}
    default-model: ${AI_DEFAULT_MODEL:claude-sonnet-4-6}
    max-concurrent-per-tenant: ${AI_MAX_CONCURRENT:5}
    max-regenerations-per-report: ${AI_MAX_REGENERATIONS:3}
    sse-pool-size: ${AI_SSE_POOL_SIZE:10}
    cost:
      sonnet-input-per-million: ${AI_COST_SONNET_INPUT:3.00}
      sonnet-output-per-million: ${AI_COST_SONNET_OUTPUT:15.00}
      sonnet-cache-read-per-million: ${AI_COST_SONNET_CACHE_READ:0.30}
      sonnet-cache-write-per-million: ${AI_COST_SONNET_CACHE_WRITE:3.75}
      brl-usd-rate: ${AI_BRL_USD_RATE:5.80}
  hsts:
    enabled: ${HSTS_ENABLED:false}

asaas:
  api-key: ${ASAAS_API_KEY:}
  webhook-token: ${ASAAS_WEBHOOK_TOKEN:}
  base-url: ${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
  nfse:
    enabled: ${ASAAS_NFSE_ENABLED:false}
    service-description: ${ASAAS_NFSE_SERVICE_DESCRIPTION:Assinatura DOX}
    municipal-service-id: ${ASAAS_NFSE_MUNICIPAL_SERVICE_ID:}
    municipal-service-code: ${ASAAS_NFSE_MUNICIPAL_SERVICE_CODE:}
    municipal-service-name: ${ASAAS_NFSE_MUNICIPAL_SERVICE_NAME:}
    retain-iss: ${ASAAS_NFSE_RETAIN_ISS:false}
    iss-percentage: ${ASAAS_NFSE_ISS_PERCENTAGE:0}

spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    chat:
      options:
        model: ${AI_MODEL:claude-sonnet-4-6}
        max-tokens: ${AI_MAX_TOKENS:8000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: ${ACTUATOR_SHOW_DETAILS:never}

springdoc:
  api-docs:
    path: /v3-docs
    enabled: ${SWAGGER_ENABLED:false}

scalar:
  enabled: ${SWAGGER_ENABLED:false}
  path: /scalar
  theme: deepSpace
  layout: modern
  force-theme-mode: dark
  show-sidebar: true
  hide-models: false
  hide-client-button: true
  tag-sorter: alpha
  operation-sorter: method
  default-http-client:
    target-key: shell
    client-key: curl
  favicon: /scalar-assets/dox-favicon.svg
  meta-data:
    title: Dox - Pense diferente. Faça melhor
  agent:
    disabled: true
  custom-css: |
    .dark-mode {
      --scalar-color-accent: #007AFF;
      --scalar-background-accent: rgba(0, 122, 255, 0.12);
    }
