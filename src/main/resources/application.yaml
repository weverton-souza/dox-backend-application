server:
  port: ${PORT:8080}
  max-http-request-header-size: 16KB

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: DOX Backend
  jackson:
    default-property-inclusion: NON_NULL
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dox}
    username: ${POSTGRES_USER:dox}
    password: ${POSTGRES_PASSWORD:dox_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        multiTenancy: SCHEMA
        tenant_identifier_resolver: com.dox.adapter.out.tenant.TenantIdentifierResolver
        multi_tenant_connection_provider: com.dox.adapter.out.tenant.TenantConnectionProvider
        generate_statistics: false
    generate-ddl: false
    show-sql: ${SHOW_SQL:true}
    open-in-view: false
  flyway:
    enabled: true

dox:
  security:
    jwt-signing-key: ${JWT_SECRET:change-me-in-production-this-is-a-long-enough-key-for-hmac-sha256-algorithm}
    access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:604800000}

spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    chat:
      options:
        model: ${AI_MODEL:claude-sonnet-4-20250514}
        max-tokens: ${AI_MAX_TOKENS:4096}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: ${ACTUATOR_SHOW_DETAILS:never}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    enabled: ${SWAGGER_ENABLED:true}
    doc-expansion: none
  api-docs:
    path: /v3-docs
    enabled: ${SWAGGER_ENABLED:true}
