server:
  port: ${PORT:8080}
  max-http-request-header-size: 16KB

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: DOX Backend
  jackson:
    default-property-inclusion: NON_NULL
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dox}
    username: ${POSTGRES_USER:dox}
    password: ${POSTGRES_PASSWORD:dox_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        multiTenancy: SCHEMA
        tenant_identifier_resolver: com.dox.adapter.out.tenant.TenantIdentifierResolver
        multi_tenant_connection_provider: com.dox.adapter.out.tenant.TenantConnectionProvider
        generate_statistics: false
    generate-ddl: false
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: true

dox:
  security:
    jwt-signing-key: ${JWT_SECRET:intSz26ioFppLXCsH7tta3HicyHtkJRTIuiC4M8jVRaP6wQNs3CNvG3mNjICqQ1M}
    access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:604800000}
  ai:
    enabled: ${AI_ENABLED:true}
    default-model: ${AI_DEFAULT_MODEL:claude-sonnet-4-6}
    max-concurrent-per-tenant: ${AI_MAX_CONCURRENT:5}
    max-regenerations-per-report: ${AI_MAX_REGENERATIONS:3}
    cost:
      sonnet-input-per-million: ${AI_COST_SONNET_INPUT:3.00}
      sonnet-output-per-million: ${AI_COST_SONNET_OUTPUT:15.00}
      sonnet-cache-read-per-million: ${AI_COST_SONNET_CACHE_READ:0.30}
      sonnet-cache-write-per-million: ${AI_COST_SONNET_CACHE_WRITE:3.75}
      brl-usd-rate: ${AI_BRL_USD_RATE:5.80}

spring.ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    chat:
      options:
        model: ${AI_MODEL:claude-sonnet-4-6}
        max-tokens: ${AI_MAX_TOKENS:8000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: ${ACTUATOR_SHOW_DETAILS:never}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    enabled: ${SWAGGER_ENABLED:true}
    doc-expansion: none
  api-docs:
    path: /v3-docs
    enabled: ${SWAGGER_ENABLED:true}
