<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="cta(variant, label, url)">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:8px 0 24px 0;">
        <tr>
            <td th:with="bg=${variant == 'danger' ? '#FF3B30' : '#0055B3'}"
                th:style="'background:' + ${bg} + ';border-radius:10px;'">
                <a th:href="${url}" th:text="${label}"
                   style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:600;color:#FFFFFF;text-decoration:none;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;">
                    Ação
                </a>
            </td>
        </tr>
    </table>
</th:block>

<th:block th:fragment="ctaFallback(url)">
    <p style="margin:0 0 24px 0;font-size:13px;line-height:1.5;color:#88888D;">
        Ou copie este endereço no navegador:<br>
        <a th:href="${url}" th:text="${url}" style="color:#0055B3;text-decoration:underline;word-break:break-all;">https://example.com</a>
    </p>
</th:block>

</body>
</html>
