<!--suppress HtmlDeprecatedAttribute, CssInvalidPropertyValue -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <title th:text="${subject}">Redefinir senha</title>
</head>
<body style="margin:0;padding:0;background-color:#FAFAFA;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#48484A;-webkit-font-smoothing:antialiased;">

<div style="display:none;max-height:0;overflow:hidden;font-size:1px;line-height:1px;color:#FAFAFA;opacity:0;">
    Link válido por 30 minutos. Se não foi você, ignore.
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#FAFAFA;">
    <tr>
        <td align="center" style="padding:40px 16px;">

            <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background-color:#FFFFFF;border-radius:20px;overflow:hidden;border:1px solid #E8E8ED;">

                <th:block th:replace="~{email/fragments/hero :: hero(eyebrow='Segurança · DOX', title='Redefinir sua senha.', subtitle='Alguém pediu pra redefinir esta conta. Se foi você, continue.')}"></th:block>

                <tr>
                    <td style="padding:36px 48px;font-size:15px;line-height:1.65;color:#48484A;">

                        <p style="margin:0 0 24px 0;">
                            Clique abaixo para criar uma nova senha. O link vale por <strong>30 minutos</strong> e pode ser usado uma única vez.
                        </p>

                        <th:block th:replace="~{email/fragments/cta :: cta(label='Redefinir senha', url=${resetUrl})}"></th:block>

                        <th:block th:replace="~{email/fragments/fallback :: fallback(url=${resetUrl})}"></th:block>

                        <p style="font-size:13px;color:#88888D;margin:24px 0 16px 0;">
                            Se você não solicitou, ignore este email — sua senha continua a mesma.
                        </p>

                        <p th:if="${requestedAt != null or ipLocation != null or userAgent != null}"
                           style="font-size:12px;color:#88888D;background:#FAFAFA;border:1px solid #E8E8ED;border-radius:10px;padding:12px 14px;margin:0;">
                            <strong th:if="${requestedAt}">Solicitado em:</strong> <span th:if="${requestedAt}" th:text="${requestedAt}">DD/MM/AAAA, HH:mm</span><br th:if="${requestedAt}">
                            <strong th:if="${ipLocation}">Dispositivo:</strong> <span th:if="${ipLocation}" th:text="${ipLocation}">Local</span><span th:if="${userAgent}" th:text="' · ' + ${userAgent}"></span>
                        </p>

                    </td>
                </tr>

                <th:block th:replace="~{email/fragments/footer :: footer(footnote='Este é um email automático de segurança. Para ajuda, acesse a central.')}"></th:block>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
