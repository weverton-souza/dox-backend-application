<!--suppress HtmlDeprecatedAttribute, CssInvalidPropertyValue -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="cta(label, url)">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:8px 0 20px 0;">
        <tr>
            <td th:style="'background:' + ${palette.ctaBackground} + ';border-radius:10px'">
                <a th:href="${url}" th:text="${label}"
                   th:style="'display:inline-block;padding:14px 28px;font-size:15px;font-weight:600;text-decoration:none;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:' + ${palette.ctaTextColor}">
                    Ação
                </a>
            </td>
        </tr>
    </table>
</th:block>

</body>
</html>
