<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="footer(footnote)">
    <tr>
        <td style="padding:24px 48px;background:#FAFAFA;border-top:1px solid #E8E8ED;">
            <div style="font-size:11px;font-weight:600;letter-spacing:0.08em;color:#88888D;margin-bottom:8px;">DOX</div>
            <p th:if="${footnote}" th:utext="${footnote}" style="margin:0 0 12px 0;font-size:11px;line-height:1.55;color:#88888D;">
                Você recebeu este email automaticamente.
            </p>
            <p style="margin:0;font-size:11px;line-height:1.55;color:#88888D;">
                <a href="https://dox.com.br/ajuda" style="color:#48484A;text-decoration:none;">Ajuda</a>
                <span style="color:#C8C8CD;">·</span>
                <a href="https://dox.com.br/termos" style="color:#48484A;text-decoration:none;">Termos</a>
                <span style="color:#C8C8CD;">·</span>
                <a href="https://dox.com.br/privacidade" style="color:#48484A;text-decoration:none;">Privacidade</a>
            </p>
            <p style="margin:16px 0 0 0;font-size:11px;color:#88888D;">
                <span>dox.com.br</span>
                <span style="float:right;">&copy; 2026 DOX</span>
            </p>
        </td>
    </tr>
</th:block>

</body>
</html>
