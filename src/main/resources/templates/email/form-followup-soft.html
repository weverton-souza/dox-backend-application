<!--suppress HtmlDeprecatedAttribute, CssInvalidPropertyValue -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <title th:text="${subject}">Lembrete de questionário</title>
</head>
<body style="margin:0;padding:0;background-color:#FAFAFA;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#48484A;-webkit-font-smoothing:antialiased;">

<div style="display:none;max-height:0;overflow:hidden;font-size:1px;line-height:1px;color:#FAFAFA;opacity:0;">
    Sem pressa — quando puder responder.
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#FAFAFA;">
    <tr>
        <td align="center" style="padding:40px 16px;">

            <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background-color:#FFFFFF;border-radius:20px;overflow:hidden;border:1px solid #E8E8ED;">

                <th:block th:replace="~{email/fragments/hero :: hero(eyebrow='Lembrete · DOX', title='Lembrete amistoso.', subtitle='Notamos que você ainda não respondeu o questionário.')}"></th:block>

                <tr>
                    <td style="padding:36px 48px;font-size:15px;line-height:1.65;color:#48484A;">

                        <p style="margin:0 0 16px 0;">Olá, <span th:text="${respondentFirstName}">respondente</span>.</p>
                        <p style="margin:0 0 24px 0;">
                            Você recebeu o questionário <strong th:text="${formTitle}">Anamnese</strong><span th:if="${isAboutCustomer}"> sobre <strong th:text="${customerName}">o cliente</strong></span>. Quando puder, leva alguns minutos.
                        </p>

                        <th:block th:replace="~{email/fragments/cta :: cta(label='Responder questionário', url=${formUrl})}"></th:block>

                        <p style="font-size:13px;color:#88888D;margin:0 0 16px 0;">
                            Sem pressa — o link continua válido até <span th:text="${expiresAtFormatted}">DD/MM</span>.
                        </p>

                        <p style="font-size:13px;color:#88888D;margin:0;">
                            Já respondeu? Pode ignorar este email.
                        </p>

                    </td>
                </tr>

                <th:block th:replace="~{email/fragments/footer :: footer(footnote='Este link é único e expira em ' + ${expiresAtFormatted} + '.')}"></th:block>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
