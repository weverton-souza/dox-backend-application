<!--suppress HtmlDeprecatedAttribute, CssInvalidPropertyValue -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <title th:text="${subject}">Faltam dias para responder</title>
</head>
<body style="margin:0;padding:0;background-color:#FAFAFA;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#48484A;-webkit-font-smoothing:antialiased;">

<div style="display:none;max-height:0;overflow:hidden;font-size:1px;line-height:1px;color:#FAFAFA;opacity:0;">
    O questionário ainda está aberto — falta pouco para encerrar.
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#FAFAFA;">
    <tr>
        <td align="center" style="padding:40px 16px;">

            <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background-color:#FFFFFF;border-radius:20px;overflow:hidden;border:1px solid #E8E8ED;">

                <th:block th:replace="~{email/fragments/hero :: hero(eyebrow='Ação pendente · DOX', title='Faltam ' + ${daysRemaining} + ' dias para responder.', subtitle='A profissional segue esperando para preparar o atendimento.')}"></th:block>

                <tr>
                    <td style="padding:36px 48px;font-size:15px;line-height:1.65;color:#48484A;">

                        <p style="margin:0 0 16px 0;">Olá, <span th:text="${respondentFirstName}">respondente</span>.</p>
                        <p style="margin:0 0 24px 0;">
                            O questionário <strong th:text="${formTitle}">Anamnese</strong> que <span th:text="${professionalName}">o profissional</span> pediu ainda está aberto. Depois de <span th:text="${expiresAtFormatted}">DD/MM</span>, o link expira.
                        </p>

                        <th:block th:replace="~{email/fragments/cta :: cta(label='Responder agora', url=${formUrl})}"></th:block>

                        <p style="font-size:13px;color:#88888D;margin:0 0 16px 0;">
                            Leva alguns minutos. Você pode salvar e voltar depois.
                        </p>

                        <p style="font-size:13px;color:#88888D;margin:0;">
                            Não conseguiu? Avise <span th:text="${professionalName}">o profissional</span> diretamente.
                        </p>

                    </td>
                </tr>

                <th:block th:replace="~{email/fragments/footer :: footer(footnote='Este link expira em ' + ${expiresAtFormatted} + '.')}"></th:block>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
