version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dox-postgres
    environment:
      POSTGRES_DB: dox
      POSTGRES_USER: dox
      POSTGRES_PASSWORD: dox_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dox -d dox"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
